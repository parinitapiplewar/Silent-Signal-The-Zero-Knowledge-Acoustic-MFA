<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocal-Vibe Mobile Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.95);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success-color: #10b981;
            --error-color: #ef4444;
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            --transition-speed: 0.4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }

        .state-panel {
            padding: 2.5rem 1.5rem;
            width: 100%;
            transition: transform var(--transition-speed) ease-in-out, opacity var(--transition-speed) ease-in-out;
        }

        #loginState {
            display: flex;
            flex-direction: column;
        }

        #verifyState {
            display: none;
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
        }
        
        .container.verifying #loginState {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .container.verifying #verifyState {
            display: flex;
            flex-direction: column;
            position: static;
            opacity: 1;
            transform: translateX(0);
        }

        /* Login Layout */
        .title {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.3;
        }

        .input-field {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .btn {
            width: 100%;
            padding: 1.1rem;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: all 0.3s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .instruction {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 2rem;
            line-height: 1.5;
        }

        /* Verify Layout */
        .verify-header {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem;
            height: 180px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            color: var(--text-muted);
            font-family: 'Courier New', Courier, monospace;
        }

        .log-item {
            animation: fadeIn 0.3s ease-in;
        }
        
        .log-item.active {
            color: var(--accent-color);
            font-weight: bold;
        }

        .log-item.success { color: var(--success-color); font-weight: bold; }
        .log-item.error { color: var(--error-color); font-weight: bold; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress Bar */
        .progress-wrapper {
            margin-bottom: 1.5rem;
        }
        
        .progress-track {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            border-radius: 3px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .progress-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
            font-weight: 500;
        }

        /* Graph */
        .graph-section {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .graph-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bars {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 5px;
            height: 50px;
        }

        .bar {
            width: 6px;
            background: var(--accent-color);
            border-radius: 3px;
            height: 10%;
            opacity: 0.5;
            transition: height 0.2s ease;
        }

        .animating .bar {
            animation: bounce 0.8s infinite alternate ease-in-out;
            opacity: 0.9;
        }

        .bar:nth-child(1) { animation-delay: 0.0s; }
        .bar:nth-child(2) { animation-delay: 0.15s; }
        .bar:nth-child(3) { animation-delay: 0.3s; }
        .bar:nth-child(4) { animation-delay: 0.45s; }
        .bar:nth-child(5) { animation-delay: 0.6s; }
        .bar:nth-child(6) { animation-delay: 0.75s; }
        .bar:nth-child(7) { animation-delay: 0.9s; }
        .bar:nth-child(8) { animation-delay: 1.05s; }
        .bar:nth-child(9) { animation-delay: 1.2s; }

        @keyframes bounce {
            0% { height: 15%; }
            100% { height: 100%; }
        }

        /* Final result state */
        .result-msg {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 1rem;
            display: none;
        }

        .container.success-mode .progress-fill { background: var(--success-color); box-shadow: 0 0 10px var(--success-glow); }
        .container.success-mode .verify-header { color: var(--success-color); }
        .container.success-mode .result-msg { display: block; color: var(--success-color); }
        .container.success-mode .animating .bar { background: var(--success-color); }

        .container.error-mode .progress-fill { background: var(--error-color); box-shadow: 0 0 10px var(--error-glow); }
        .container.error-mode .verify-header { color: var(--error-color); }
        .container.error-mode .result-msg { display: block; color: var(--error-color); }

        /* Debug Section */
        .debug-section {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            text-align: left;
        }

        .debug-header {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .debug-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 0.85rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            color: var(--accent-color);
            max-height: 120px;
            overflow-y: auto;
            word-break: break-all;
        }
        
        .debug-box div { margin-bottom: 0.5rem; }
        .debug-box span.label { color: var(--text-muted); }
        .debug-box span.val { color: var(--text-main); }
    </style>
</head>
<body>

    <div class="container" id="appContainer">
        <!-- State 1: Login -->
        <div class="state-panel" id="loginState">
            <h1 class="title">Vocal-Vibe<br>Mobile Verification</h1>
            <form id="mobileForm">
                <input type="email" id="emailInput" class="input-field" placeholder="Enter Email" required>
                <button type="submit" class="btn">Verify Device</button>
            </form>
            <p class="instruction">Keep your phone near the computer to complete secure verification.</p>
        </div>

        <!-- State 2: Verification -->
        <div class="state-panel" id="verifyState">
            <h2 class="verify-header" id="verifyHeader">Authenticating...</h2>
            
            <div class="status-box" id="statusLog"></div>

            <div class="progress-wrapper">
                <div class="progress-track">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressPercent">0%</div>
            </div>

            <div class="graph-section">
                <div class="graph-title">Signal Activity</div>
                <div class="bars" id="signalBars">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>

            <div class="result-msg" id="resultMsg">Verification Complete</div>

            <!-- New Reception Debug -->
            <div class="debug-section" id="receptionDebug" style="display: none;">
                <div class="debug-header">Reception Debug</div>
                <div class="debug-box" id="debugBox">
                    <div><span class="label">Received Binary:</span> <span class="val" id="received-binary"></span></div>
                    <div><span class="label">Decoded Challenge:</span> <span class="val" id="decoded-challenge"></span></div>
                    <div><span class="label">HMAC:</span> <span class="val" id="generated-hmac"></span></div>
                </div>
            </div>

            <!-- New Live Detection Debug -->
            <div class="debug-section" id="liveDetectionDebug" style="display: none;">
                <div class="debug-header">Live Detection Debug</div>
                <div class="debug-box" id="liveDebugBox">
                    <div><span class="label">Detected Frequencies:</span> <span class="val" id="detected-freqs"></span></div>
                    <div><span class="label">Detected Bits:</span> <span class="val" id="detected-bits"></span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- HMAC Helper ---
        async function generateHMAC(challenge) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode("vibe_signal_key");
            const msgData = encoder.encode(challenge);
            
            const cryptoKey = await crypto.subtle.importKey(
                "raw", keyData, { name: "HMAC", hash: "SHA-256" },
                false, ["sign"]
            );
            
            const signature = await crypto.subtle.sign("HMAC", cryptoKey, msgData);
            return Array.from(new Uint8Array(signature))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        // --- Web Audio API Receiver ---
        class AcousticReceiver {
            constructor(onStatus) {
                this.onStatus = onStatus;
                this.audioCtx = null;
                this.analyser = null;
                this.stream = null;
                this.bands = {
                    'END':   [1200, 2000],
                    'START': [1800, 2600],
                    '0':     [2500, 3500],
                    '1':     [3500, 5000]
                };
                this.state = 'WAITING'; // WAITING, RECEIVING, COMPLETED
                this.bits = [];
                this.lastStableSym = null;
                this.stableCount = 0;
                this.isListening = false;
            }

            async start() {
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const source = this.audioCtx.createMediaStreamSource(this.stream);
                    this.analyser = this.audioCtx.createAnalyser();
                    this.analyser.fftSize = 2048;
                    source.connect(this.analyser);
                    this.isListening = true;
                    this.loop();
                    return true;
                } catch (err) {
                    console.error("Mic access error:", err);
                    return false;
                }
            }

            stop() {
                this.isListening = false;
                if (this.stream) this.stream.getTracks().forEach(t => t.stop());
                if (this.audioCtx) this.audioCtx.close();
            }

            getBandEnergy(dataArray, lowFreq, highFreq) {
                const sampleRate = this.audioCtx.sampleRate;
                const fftSize = this.analyser.fftSize;
                const lowBin = Math.round(lowFreq / (sampleRate / fftSize));
                const highBin = Math.round(highFreq / (sampleRate / fftSize));
                
                let energy = 0;
                for (let i = lowBin; i <= highBin; i++) {
                    energy += dataArray[i];
                }
                return energy / (highBin - lowBin + 1);
            }

            loop() {
                if (!this.isListening) return;

                const dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                this.analyser.getByteFrequencyData(dataArray);

                let maxEnergy = 0;
                let detectedSym = null;

                for (const [sym, range] of Object.entries(this.bands)) {
                    const energy = this.getBandEnergy(dataArray, range[0], range[1]);
                    if (energy > maxEnergy && energy > 40) { // Threshold
                        maxEnergy = energy;
                        detectedSym = sym;
                    }
                }

                if (detectedSym === this.lastStableSym) {
                    this.stableCount++;
                } else {
                    this.lastStableSym = detectedSym;
                    this.stableCount = 0;
                }

                // Stability check (e.g. 5 frames)
                if (this.stableCount === 5 && detectedSym) {
                    this.handleSymbol(detectedSym);
                }

                requestAnimationFrame(() => this.loop());
            }

            handleSymbol(sym) {
                if (this.state === 'WAITING' && sym === 'START') {
                    console.log("[RX] START detected");
                    this.state = 'RECEIVING';
                    this.onStatus('START');
                } else if (this.state === 'RECEIVING') {
                    if (sym === 'END') {
                        console.log("[RX] END detected");
                        this.state = 'COMPLETED';
                        this.onStatus('END', this.reconstructString());
                    } else if (sym === '0' || sym === '1') {
                        // Prevent duplicate bits from same tone
                        if (this.bits.length === 0 || this.bits[this.bits.length-1].sym !== sym || (Date.now() - this.bits[this.bits.length-1].time > 300)) {
                            console.log(`[RX] Bit ${sym} detected`);
                            this.bits.push({ sym, time: Date.now() });
                            this.onStatus('BIT', sym);
                        }
                    }
                }
            }

            reconstructString() {
                const binary = this.bits.map(b => b.sym).join('');
                let str = "";
                for (let i = 0; i < binary.length; i += 8) {
                    const byte = binary.substr(i, 8);
                    if (byte.length === 8) {
                        str += String.fromCharCode(parseInt(byte, 2));
                    }
                }
                return { binary, str };
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('mobileForm');
            const emailInput = document.getElementById('emailInput');
            const container = document.getElementById('appContainer');
            const statusLog = document.getElementById('statusLog');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const signalBars = document.getElementById('signalBars');
            const resultMsg = document.getElementById('resultMsg');
            const verifyHeader = document.getElementById('verifyHeader');

            let receiver = null;

            function addLog(text, className = 'active') {
                const prev = statusLog.querySelector('.active');
                if (prev) prev.classList.remove('active');

                const div = document.createElement('div');
                div.className = `log-item ${className}`;
                div.textContent = `> ${text}`;
                statusLog.appendChild(div);
                statusLog.scrollTop = statusLog.scrollHeight;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                if(!email) return;

                container.classList.add('verifying');
                addLog("Initializing microphone...");
                progressBar.style.width = "10%";

                receiver = new AcousticReceiver(async (type, data) => {
                    if (type === 'START') {
                        addLog("Signal START detected", "success");
                        signalBars.classList.add('animating');
                        progressBar.style.width = "30%";
                    } else if (type === 'BIT') {
                        // Optional: update UI for each bit
                        document.getElementById('detected-bits').textContent += data;
                    } else if (type === 'END') {
                        addLog("Signal END detected", "success");
                        signalBars.classList.remove('animating');
                        progressBar.style.width = "60%";
                        
                        const { binary, str } = data;
                        console.log("Decoded:", str);
                        addLog("Challenge decoded: " + str);
                        
                        document.getElementById('receptionDebug').style.display = 'block';
                        document.getElementById('received-binary').textContent = binary;
                        document.getElementById('decoded-challenge').textContent = str;

                        // Calculate HMAC
                        addLog("Generating HMAC...");
                        const hmac = await generateHMAC(str);
                        document.getElementById('generated-hmac').textContent = hmac;

                        // POST to backend
                        addLog("Submitting verification...");
                        try {
                            const res = await fetch('/mobile_verify', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email, hmac })
                            });
                            const result = await res.json();
                            
                            if (result.status === 'success') {
                                addLog("Verification SUCCESS", "success");
                                container.classList.add('success-mode');
                                verifyHeader.textContent = "Success";
                            } else {
                                addLog("Verification FAILED: " + (result.message || ""), "error");
                                container.classList.add('error-mode');
                                verifyHeader.textContent = "Failed";
                            }
                        } catch (err) {
                            addLog("Network error submitting HMAC", "error");
                        }
                        
                        receiver.stop();
                        progressBar.style.width = "100%";
                        progressPercent.textContent = "100%";
                    }
                });

                const started = await receiver.start();
                if (!started) {
                    addLog("Mic access denied or error", "error");
                    return;
                }

                addLog("Listening for ultrasonic signal...");
                document.getElementById('liveDetectionDebug').style.display = 'block';
            });
        });
    </script>
</body>
</html>
